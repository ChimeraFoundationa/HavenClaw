[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.26"
optimizer = true
optimizer_runs = 200
via_ir = false
evm_version = "cancun"

[rpc_endpoints]
fuji = "https://api.avax-test.network/ext/bc/C/rpc"
mainnet = "https://api.avax.network/ext/bc/C/rpc"
local = "http://localhost:9650/ext/bc/C/rpc"

[etherscan]
fuji = { key = "${SNOWTRACE_API_KEY}", chain = 43113 }
mainnet = { key = "${SNOWTRACE_API_KEY}", chain = 43114 }

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = true
