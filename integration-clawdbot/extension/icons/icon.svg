<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="64" cy="64" r="60" fill="url(#grad)"/>
  
  <!-- Temple/Pillar Icon (Haven) -->
  <g transform="translate(64, 64)">
    <!-- Top Pediment -->
    <polygon points="-30,-20 0,-35 30,-20" fill="white" opacity="0.9"/>
    
    <!-- Columns -->
    <rect x="-25" y="-15" width="8" height="35" fill="white" opacity="0.9"/>
    <rect x="-8" y="-15" width="8" height="35" fill="white" opacity="0.9"/>
    <rect x="9" y="-15" width="8" height="35" fill="white" opacity="0.9"/>
    <rect x="26" y="-15" width="8" height="35" fill="white" opacity="0.9"/>
    
    <!-- Base -->
    <rect x="-35" y="18" width="70" height="8" fill="white" opacity="0.9"/>
    
    <!-- Claw/Lobster hint -->
    <path d="M -10,28 Q 0,35 10,28" stroke="white" stroke-width="3" fill="none" opacity="0.7"/>
  </g>
  
  <!-- Border -->
  <circle cx="64" cy="64" r="58" fill="none" stroke="white" stroke-width="3" opacity="0.3"/>
</svg>
