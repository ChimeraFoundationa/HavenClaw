<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <defs>
    <!-- Primary Gradient -->
    <linearGradient id="primaryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    
    <!-- Secondary Gradient -->
    <linearGradient id="secondaryGradient" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    
    <!-- Glow Filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Background Glow -->
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
  </defs>
  
  <!-- Background Circle with Glow -->
  <circle cx="200" cy="200" r="180" fill="url(#bgGlow)"/>
  
  <!-- Outer Ring -->
  <circle cx="200" cy="200" r="170" stroke="url(#primaryGradient)" stroke-width="3" fill="none" opacity="0.5"/>
  <circle cx="200" cy="200" r="150" stroke="url(#secondaryGradient)" stroke-width="2" fill="none" opacity="0.3"/>
  
  <!-- Central Hexagon (Blockchain/Network Symbol) -->
  <g filter="url(#glow)">
    <path d="M200 120 L260 155 L260 225 L200 260 L140 225 L140 155 Z" 
          fill="none" 
          stroke="url(#primaryGradient)" 
          stroke-width="4"
          stroke-linejoin="round"/>
  </g>
  
  <!-- Inner Network Nodes -->
  <g filter="url(#glow)">
    <!-- Center Node -->
    <circle cx="200" cy="190" r="12" fill="url(#primaryGradient)"/>
    
    <!-- Orbiting Nodes -->
    <circle cx="200" cy="140" r="8" fill="url(#secondaryGradient)"/>
    <circle cx="243" cy="215" r="8" fill="url(#secondaryGradient)"/>
    <circle cx="157" cy="215" r="8" fill="url(#secondaryGradient)"/>
    
    <!-- Connection Lines -->
    <line x1="200" y1="190" x2="200" y2="148" stroke="url(#primaryGradient)" stroke-width="2" opacity="0.6"/>
    <line x1="200" y1="190" x2="237" y2="212" stroke="url(#primaryGradient)" stroke-width="2" opacity="0.6"/>
    <line x1="200" y1="190" x2="163" y2="212" stroke="url(#primaryGradient)" stroke-width="2" opacity="0.6"/>
  </g>
  
  <!-- AI Brain/Circuit Pattern -->
  <g opacity="0.4">
    <path d="M200 100 L200 80" stroke="url(#primaryGradient)" stroke-width="2" stroke-linecap="round"/>
    <path d="M280 190 L300 190" stroke="url(#primaryGradient)" stroke-width="2" stroke-linecap="round"/>
    <path d="M120 190 L100 190" stroke="url(#primaryGradient)" stroke-width="2" stroke-linecap="round"/>
    <path d="M200 280 L200 300" stroke="url(#primaryGradient)" stroke-width="2" stroke-linecap="round"/>
    
    <!-- Diagonal Lines -->
    <path d="M260 120 L275 105" stroke="url(#primaryGradient)" stroke-width="2" stroke-linecap="round"/>
    <path d="M140 120 L125 105" stroke="url(#primaryGradient)" stroke-width="2" stroke-linecap="round"/>
    <path d="M260 260 L275 275" stroke="url(#primaryGradient)" stroke-width="2" stroke-linecap="round"/>
    <path d="M140 260 L125 275" stroke="url(#primaryGradient)" stroke-width="2" stroke-linecap="round"/>
  </g>
  
  <!-- Orbiting Electrons -->
  <g>
    <circle cx="200" cy="60" r="5" fill="#06b6d4" filter="url(#glow)">
      <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="340" cy="200" r="5" fill="#8b5cf6" filter="url(#glow)">
      <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="-360 200 200" dur="10s" repeatCount="indefinite"/>
    </circle>
    <circle cx="200" cy="340" r="5" fill="#6366f1" filter="url(#glow)">
      <animateTransform attributeName="transform" type="rotate" from="180 200 200" to="540 200 200" dur="12s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Corner Accents -->
  <g opacity="0.6">
    <path d="M60 60 L80 60 L80 70 L70 70 L70 80 L60 80 Z" fill="url(#primaryGradient)"/>
    <path d="M340 60 L320 60 L320 70 L330 70 L330 80 L340 80 Z" fill="url(#secondaryGradient)"/>
    <path d="M60 340 L80 340 L80 330 L70 330 L70 320 L60 320 Z" fill="url(#secondaryGradient)"/>
    <path d="M340 340 L320 340 L320 330 L330 330 L330 320 L340 320 Z" fill="url(#primaryGradient)"/>
  </g>
</svg>